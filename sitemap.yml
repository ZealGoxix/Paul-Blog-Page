name: Generate XML Sitemap

on:
  push:
    branches: [ main ]
  # Allows manual runs from the Actions tab
  workflow_dispatch: 

jobs:
  sitemap_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for file modification times

      - name: Generate the sitemap
        uses: cicirello/generate-sitemap@v1.10.4
        with:
          base-url-path: https://your-website-url.com # Required

      - name: Commit and push sitemap
        run: |
          # Git configuration to commit the generated sitemap
          git config --global user.name 'github-actions'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add sitemap.xml
          git commit -m "Automated sitemap update"
          git push
